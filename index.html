  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0%;}\n    .hero-cta .btn{width:100%;justify-content:center;}\n    .hero-photos{grid-template-columns:1fr;gap:14px;}\n    .hero-photos image-slot{height:200px;}\n    .sec-title{font-size:clamp(34px,11vw,52px);}\n    .sec-sub{font-size:16px;}\n    .serv h3{font-size:clamp(24px,7vw,32px);}\n    .stat{padding:24px 12px;}\n    .bento{gap:14px;}\n    .bcard{padding:28px 24px;}\n    .quote-card blockquote{font-size:clamp(24px,7vw,34px);}\n    .cta h2{font-size:clamp(46px,14vw,72px);}\n    .faq button h4{font-size:18px;}\n    .ticker-track span{font-size:17px;gap:26px;}\n    .foot-grid{grid-template-columns:1fr;}\n  }\n  /* ===== very small (320px) ===== */\n  @media(max-width:360px){\n    .wrap{padding:0 14px;}\n    .hero-head h1{font-size:clamp(34px,13vw,50px);}\n    .mobile-menu a.mlink{font-size:clamp(26px,10vw,38px);}\n  }\n  /* ===== landscape phones / short viewports ===== */\n  @media(max-height:560px) and (max-width:920px){\n    .hero-stage{height:auto;}\n    .hero-pin{position:static;height:auto;display:block;padding:90px 0 50px;overflow:visible;}\n    .sr{opacity:1 !important;transform:none !important;}\n    .scroll-hint{display:none;}\n    .mobile-menu{justify-content:flex-start;gap:4px;}\n    .mobile-menu a.mlink{font-size:clamp(22px,7vh,32px);padding:6px 0;}\n  }\n  /* safe-area bottom on closing sections */\n  footer{padding-bottom:calc(36px + env(safe-area-inset-bottom));}\n</style>\n</head>\n<body>\n\n<!-- PRELOADER -->\n<div id=\"preloader\">\n  <div class=\"pl-name\" id=\"plName\">\n    <span class=\"ch\" style=\"animation-delay:.05s\">M</span><span class=\"ch\" style=\"animation-delay:.10s\">A</span><span class=\"ch\" style=\"animation-delay:.15s\">R</span><span class=\"ch\" style=\"animation-delay:.20s\">K</span><span class=\"ch\" style=\"animation-delay:.25s\">E</span><span class=\"ch\" style=\"animation-delay:.30s\">T</span><span class=\"ch\" style=\"animation-delay:.35s\">I</span><span class=\"ch x\" style=\"animation-delay:.40s\">X</span>\n    <span \n<!-- FOOTER -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div>\n        <a href=\"#\" class=\"brand\">\n          <img class=\"logo\" src=\"e62b5b4f-56fd-48b3-93bb-8fdcc96b7e7e\" alt=\"Marketix logo\">\n          <span>Marketi<span class=\"x\">X</span></span>\n        </a>\n        <p class=\"tag\">A premium web &amp; marketing studio. We design, build and scale websites that drive real growth.</p>\n        <div class=\"socials\">\n          <a href=\"https://instagram.com\" aria-label=\"Instagram\"><i data-lucide=\"instagram\"></i></a>\n          <a href=\"https://linkedin.com\" aria-label=\"LinkedIn\"><i data-lucide=\"linkedin\"></i></a>\n          <a href=\"https://twitter.com\" aria-label=\"X\"><i data-lucide=\"twitter\"></i></a>\n          <a href=\"mailto:marketix1807@gmail.com\" aria-label=\"Email\"><i data-lucide=\"mail\"></i></a>\n        </div>\n      </div>\n      <div class=\"foot-col\">\n        <h5>Services</h5>\n        <a href=\"#services\">Web Design</a>\n        <a href=\"#services\">Branding</a>\n        <a href=\"#services\">SEO &amp; Growth</a>\n        <a href=\"#services\">Marketing</a>\n      </div>\n      <div class=\"foot-col\">\n        <h5>Company</h5>\n        <a href=\"#process\">Process</a>\n        <a href=\"#about\">About</a>\n        <a href=\"#contact\">Contact</a>\n      </div>\n      <div class=\"foot-col\">\n        <h5>Get in touch</h5>\n        <a href=\"mailto:marketix1807@gmail.com\">marketix1807@gmail.com</a>\n        <a href=\"https://wa.me/918955632343\">+91 8955632343</a>\n        <p>Tulip Enclave, Central Spine, Vidhyadhar Nagar, Jaipur</p>\n      </div>\n    </div>\n    <div class=\"foot-bottom\">\n      <span>© 2026 Marketix. All rights reserved.</span>\n      <span>Built for growth.</span>\n    </div>\n  </div>\n</footer>\n\n<script>\n  lucide.createIcons();\n\n  /* ===== preloader ===== */\n  (function(){\n    const pre=document.getElementById('preloader');\n    setTimeout(()=>{pre.classList.add('go');},2050);\n    setTimeout(()=>{\n      pre.style.opacity='0';\n      pre.style.pointerEvents='none';\n      document.body.dataset.loaded='1';\n      setTimeout(()=>{pre.remove();},600);\n    },2600);\n  })();\n\n  /* ===== mobile menu toggle ===== */\n  (function(){\n    const ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),body=document.body;\n    if(!ham)return;\n    const close=()=>{body.classList.remove('menu-open');ham.setAttribute('aria-expanded','false');};\n    ham.addEventListener('click',()=>{\n      const open=body.classList.toggle('menu-open');\n      ham.setAttribute('aria-expanded',open?'true':'false');\n    });\n    menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',close));\n    window.addEventListener('keydown',e=>{if(e.key==='Escape')close();});\n  })();\n\n  /* ===== hero reveal on load (staggered, scroll-independent) ===== */\n  (function(){\n    const items=[...document.querySelectorAll('.hero-pin .sr')];\n    const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    if(reduce){items.forEach(el=>el.classList.add('in'));return;}\n    // reveal after the intro finishes; fall back if preloader already gone\n    const start=document.getElementById('preloader')?2750:200;\n    setTimeout(()=>{\n      items.forEach((el,i)=>{\n        el.style.transitionDelay=(i*0.09)+'s';\n        requestAnimationFrame(()=>el.classList.add('in'));\n      });\n    },start);\n  })();\n\n  /* ===== scroll reveals for lower sections (repeat every time) ===== */\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ e.target.classList.toggle('in', e.isIntersecting); });\n  },{threshold:.12});\n  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n\n  /* animated counters */\n  const fmt=(v,dec)=>dec?v.toFixed(dec):Math.round(v).toString();\n  const countIO=new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      const el=e.target;\n      if(!e.isIntersecting){el.textContent='0'+(el.dataset.suffix||'');return;}\n      if(el.dataset.running)return;\n      el.dataset.running='1';\n      const target=parseFloat(el.dataset.target),dec=parseInt(el.dataset.dec||'0'),suf=el.dataset.suffix||'';\n      let start=null;const dur=1400;\n      const tick=(t)=>{ if(!start)start=t; const p=Math.min((t-start)/dur,1);\n        const ease=1-Math.pow(1-p,3); el.textContent=fmt(target*ease,dec)+suf;\n        if(p<1)requestAnimationFrame(tick); else el.dataset.running=''; };\n      requestAnimationFrame(tick);\n    });\n  },{threshold:.6});\n  document.querySelectorAll('.stat b[data-target]').forEach(el=>countIO.observe(el));\n\n  /* faq accordion */\n  document.querySelectorAll('.faq button').forEach(btn=>{\n    btn.addEventListener('click',()=>{\n      const item=btn.parentElement, isOpen=item.classList.contains('open');\n      document.querySelectorAll('.faq').forEach(f=>f.classList.remove('open'));\n      if(!isOpen)item.classList.add('open');\n    });\n  });\n<\/script>\n\n\n\n</body></html>"
